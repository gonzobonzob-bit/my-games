<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>X-Files: The Bureau</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a06;--bg2:#0d0f0a;--bg3:#141610;
  --paper:#e8e0c8;--paper2:#d8d0b0;--paper3:#c8c0a0;
  --red:#8b1a1a;--red2:#c02020;--green:#1a4a1a;--green2:#2a6a2a;
  --amber:#8a5a10;--amber2:#c08020;
  --text:#1a1a14;--text2:#3a3a2a;--text3:#6a6a5a;
  --border:rgba(30,30,20,0.2);--border2:rgba(30,30,20,0.4);
  --xfile:#1a1a14;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--paper);font-family:'Courier Prime',monospace;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(200,190,160,0.2)}

.screen{position:fixed;inset:0;display:none;flex-direction:column;z-index:1;background:var(--bg)}
.screen.active{display:flex}

/* MENU */
#scr-menu{align-items:center;justify-content:center;gap:12px;background:radial-gradient(ellipse 60% 50% at 50% 30%,rgba(139,26,26,0.08) 0%,transparent 70%),var(--bg)}
.xf-logo{text-align:center}
.xf-logo-x{font-family:'Special Elite',cursive;font-size:clamp(52px,15vw,88px);color:var(--red2);text-shadow:0 0 40px rgba(192,32,32,0.3);line-height:1}
.xf-logo-sub{font-family:'Special Elite',cursive;font-size:clamp(11px,3vw,15px);letter-spacing:6px;color:var(--paper3);text-transform:uppercase;margin-top:-4px}
.xf-tagline{font-size:12px;color:var(--paper3);letter-spacing:2px;margin-top:8px;font-style:italic}
.xf-btn{display:block;width:220px;padding:12px;border:1px solid rgba(200,190,160,0.25);background:rgba(200,190,160,0.05);color:var(--paper2);font-family:'Special Elite',cursive;font-size:14px;letter-spacing:2px;text-align:center;cursor:pointer;transition:all .2s}
.xf-btn:hover{background:rgba(200,190,160,0.12);border-color:rgba(200,190,160,0.5)}
.xf-btn.primary{background:var(--red);color:var(--paper);border-color:var(--red2)}
.xf-btn.primary:hover{background:var(--red2)}

/* GAME HUD */
#hdr{background:var(--bg2);border-bottom:1px solid rgba(200,190,160,0.1);display:flex;align-items:center;padding:6px 10px;gap:8px;flex-shrink:0}
.hdr-xf{font-family:'Special Elite',cursive;font-size:14px;color:var(--red2);letter-spacing:2px}
.hdr-case{font-size:11px;color:var(--paper3);flex:1;text-align:center}
.hdr-stat{font-size:11px;color:var(--paper3)}
.hdr-stat span{color:var(--paper)}
.hdr-btn{padding:4px 8px;border:1px solid rgba(200,190,160,0.2);background:transparent;color:var(--paper3);font-size:10px;cursor:pointer;font-family:'Courier Prime',monospace}

#tabs{display:flex;background:var(--bg2);border-bottom:1px solid rgba(200,190,160,0.1);flex-shrink:0}
.tab{flex:1;padding:8px 2px;text-align:center;cursor:pointer;font-family:'Special Elite',cursive;font-size:9px;letter-spacing:1px;color:var(--paper3);text-transform:uppercase;border-bottom:1px solid transparent;transition:all .2s}
.tab.active{color:var(--paper);border-bottom-color:var(--red2);background:rgba(139,26,26,0.08)}

#content{flex:1;overflow:hidden}
.panel{display:none;height:100%;overflow-y:auto;padding:12px;flex-direction:column;gap:10px}
.panel.active{display:flex}

.xf-section{font-family:'Special Elite',cursive;font-size:10px;letter-spacing:3px;color:var(--paper3);border-bottom:1px solid rgba(200,190,160,0.15);padding-bottom:5px;margin-bottom:4px;text-transform:uppercase}

/* AGENT CARDS */
.agent-card{background:rgba(200,190,160,0.06);border:1px solid rgba(200,190,160,0.15);border-radius:3px;padding:10px;display:flex;gap:10px;align-items:center}
.agent-avatar{width:44px;height:44px;border-radius:50%;border:2px solid rgba(200,190,160,0.2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:rgba(200,190,160,0.08)}
.agent-info{flex:1}
.agent-name{font-family:'Special Elite',cursive;font-size:14px;color:var(--paper);margin-bottom:2px}
.agent-role{font-size:10px;color:var(--paper3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.agent-stats{display:flex;gap:12px}
.agent-stat{font-size:10px;color:var(--paper3)}
.agent-stat span{color:var(--paper2)}
.xp-bar-wrap{height:3px;background:rgba(200,190,160,0.1);border-radius:2px;overflow:hidden;margin-top:5px}
.xp-bar{height:100%;background:var(--red2);border-radius:2px;transition:width .5s}
.agent-skill-btn{padding:5px 10px;border:1px solid rgba(200,190,160,0.2);background:transparent;color:var(--paper3);font-size:10px;cursor:pointer;font-family:'Courier Prime',monospace;white-space:nowrap}
.agent-skill-btn:active{background:rgba(200,190,160,0.1)}

/* CASE FILES */
.case-card{background:rgba(200,190,160,0.06);border:1px solid rgba(200,190,160,0.15);border-radius:3px;padding:12px;cursor:pointer;transition:all .2s}
.case-card.active-case{border-color:var(--red2);background:rgba(139,26,26,0.08)}
.case-card:hover:not(.active-case){border-color:rgba(200,190,160,0.3)}
.case-num{font-family:'Special Elite',cursive;font-size:10px;color:var(--red2);letter-spacing:2px;margin-bottom:4px}
.case-title{font-family:'Special Elite',cursive;font-size:15px;color:var(--paper);margin-bottom:4px}
.case-desc{font-size:11px;color:var(--paper3);line-height:1.5;margin-bottom:8px}
.case-status{font-size:10px;letter-spacing:1px;text-transform:uppercase}
.case-status.open{color:#4caf7a}
.case-status.active{color:var(--red2)}
.case-status.closed{color:var(--paper3)}
.case-progress{height:4px;background:rgba(200,190,160,0.1);border-radius:2px;overflow:hidden;margin-top:8px}
.case-prog-fill{height:100%;background:var(--red2);border-radius:2px;transition:width .5s}
.case-btn{display:inline-block;margin-top:10px;padding:6px 14px;border:1px solid var(--red);background:rgba(139,26,26,0.15);color:var(--red2);font-size:11px;cursor:pointer;font-family:'Courier Prime',monospace}
.case-btn:active{background:rgba(139,26,26,0.35)}

/* CORKBOARD */
#corkboard{background:#2a1f10;border-radius:4px;padding:14px;min-height:300px;position:relative;border:2px solid #3a2a15}
.cork-title{font-family:'Special Elite',cursive;font-size:12px;letter-spacing:3px;color:#c8a870;text-transform:uppercase;margin-bottom:12px;text-align:center}
.cork-item{background:var(--paper);color:var(--text);padding:8px;margin:6px;display:inline-block;position:relative;font-size:10px;line-height:1.5;max-width:140px;vertical-align:top;box-shadow:2px 2px 6px rgba(0,0,0,0.4)}
.cork-item::before{content:'📌';position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:14px}
.cork-item.red{background:#ffdddd}
.cork-item.yellow{background:#ffffcc}
.cork-item.blue{background:#ddeeff}
.cork-item strong{display:block;font-family:'Special Elite',cursive;font-size:11px;margin-bottom:3px;color:var(--red)}
.cork-string{border-top:1px solid rgba(220,50,50,0.4);margin:8px 0}

/* ACTION LOG */
.log-entry{font-size:11px;color:var(--paper3);padding:4px 0;border-bottom:1px solid rgba(200,190,160,0.08);line-height:1.5}
.log-entry.important{color:var(--red2)}
.log-entry.success{color:#4caf7a}

.notify{position:fixed;top:68px;right:10px;background:var(--bg3);border:1px solid var(--red);color:var(--red2);font-size:11px;padding:8px 12px;z-index:999;transform:translateX(120%);transition:transform .25s;font-family:'Courier Prime',monospace;max-width:200px}
.notify.show{transform:translateX(0)}
</style>
</head>
<body>

<!-- MENU -->
<div class="screen active" id="scr-menu">
  <div class="xf-logo">
    <div class="xf-logo-x">X</div>
    <div class="xf-logo-sub">— Files —</div>
    <div class="xf-tagline">The Truth Is Out There</div>
  </div>
  <button class="xf-btn primary" onclick="startGame()">▶ Open The Files</button>
  <button class="xf-btn" onclick="loadGame()">↺ Continue Investigation</button>
</div>

<!-- GAME -->
<div class="screen" id="scr-game">
  <div id="hdr">
    <div class="hdr-xf">X</div>
    <div class="hdr-case" id="hdr-case">FBI PARANORMAL DIVISION</div>
    <div class="hdr-stat">AP: <span id="hdr-ap">3</span></div>
    <div class="hdr-stat">Day <span id="hdr-day">1</span></div>
    <button class="hdr-btn" onclick="showScreen('scr-menu')">MENU</button>
  </div>
  <div id="tabs">
    <div class="tab active" data-panel="pan-agents" onclick="switchTab(this)">Agents</div>
    <div class="tab" data-panel="pan-cases" onclick="switchTab(this)">Cases</div>
    <div class="tab" data-panel="pan-board" onclick="switchTab(this)">Board</div>
    <div class="tab" data-panel="pan-log" onclick="switchTab(this)">Log</div>
  </div>
  <div id="content">
    <!-- AGENTS -->
    <div class="panel active" id="pan-agents">
      <div class="xf-section">Active Agents</div>
      <div id="agent-list"></div>
    </div>
    <!-- CASES -->
    <div class="panel" id="pan-cases">
      <div class="xf-section">X-Files Case Database</div>
      <div id="case-list"></div>
    </div>
    <!-- CORKBOARD -->
    <div class="panel" id="pan-board">
      <div id="corkboard">
        <div class="cork-title">◈ Conspiracy Board ◈</div>
        <div id="cork-items"></div>
      </div>
    </div>
    <!-- LOG -->
    <div class="panel" id="pan-log">
      <div class="xf-section">Field Log</div>
      <div id="action-log"></div>
    </div>
  </div>
</div>

<div class="notify" id="notify"></div>

<script>
// ══════════════════════════════════════════════════════
//  X-FILES: THE BUREAU
// ══════════════════════════════════════════════════════

let G = {
  ap: 3, maxAP: 3,
  day: 1, activeCase: null,
  clues: 0, closedCases: 0,
  conspiracyPins: []
};

const AGENTS = [
  { id:'mulder',  name:'Fox Mulder',       avatar:'🧑‍💼', role:'Special Agent',    hp:100, skill:'Intuition',  xp:0, xpNext:100, level:1, specialization:'Paranormal', stat1:'Paranormal: 9', stat2:'Logic: 6' },
  { id:'scully',  name:'Dana Scully',       avatar:'👩‍⚕️', role:'Medical Examiner',  hp:100, skill:'Forensics',  xp:0, xpNext:100, level:1, specialization:'Science', stat1:'Medicine: 9', stat2:'Paranormal: 3' },
  { id:'skinner', name:'Walter Skinner',    avatar:'👨‍💼', role:'Assistant Director',hp:100, skill:'Authority',  xp:0, xpNext:100, level:1, specialization:'Leadership', stat1:'Authority: 8', stat2:'Politics: 7' },
  { id:'doggett', name:'John Doggett',      avatar:'🕵️', role:'Special Agent',     hp:100, skill:'Combat',     xp:0, xpNext:100, level:1, specialization:'Investigation', stat1:'Combat: 8', stat2:'Logic: 7' },
  { id:'reyes',   name:'Monica Reyes',      avatar:'👩‍🔬', role:'Special Agent',    hp:100, skill:'Profiling',  xp:0, xpNext:100, level:1, specialization:'Profiling', stat1:'Profiling: 8', stat2:'Paranormal: 6' },
  { id:'krycek',  name:'Alex Krycek',       avatar:'😈', role:'Double Agent',       hp:100, skill:'Deception',  xp:0, xpNext:100, level:1, specialization:'Espionage', stat1:'Deception: 9', stat2:'Combat: 7' },
  { id:'csm',     name:'Cigarette Man',     avatar:'🚬', role:'Syndicate Operative',hp:100, skill:'Conspiracy',xp:0, xpNext:100, level:1, specialization:'Conspiracy', stat1:'Influence: 10',stat2:'Secrecy: 9' },
  { id:'lone',    name:'Lone Gunmen',       avatar:'🖥️', role:'Hackers',            hp:100, skill:'Hacking',   xp:0, xpNext:100, level:1, specialization:'Tech', stat1:'Hacking: 8', stat2:'Research: 8' },
];

const CASES = [
  { id:'c1', num:'X-1013', title:'The Flukeman',       desc:'A mutated human flatworm living in the sewers. Sightings reported near Newark.', clues:3, reward:20, classification:'MONSTER-OF-THE-WEEK', progress:0, status:'open' },
  { id:'c2', num:'X-0202', title:'Duane Barry',        desc:'A former FBI agent claims alien abduction. Is he delusional or telling the truth?', clues:4, reward:25, classification:'ABDUCTION', progress:0, status:'open' },
  { id:'c3', num:'X-0381', title:'Squeeze',            desc:'A mutant with the ability to squeeze through any opening. Liver harvesting spree.', clues:3, reward:20, classification:'MUTANT', progress:0, status:'open' },
  { id:'c4', num:'X-0819', title:'Ice',                desc:'A parasitic worm found in Alaskan ice. Drives hosts to murderous rage.', clues:5, reward:30, classification:'EXTRATERRESTRIAL', progress:0, status:'open' },
  { id:'c5', num:'X-1121', title:'Eve',                desc:'Identical girls. Cloned serial killers with heightened intelligence.', clues:4, reward:25, classification:'GENETIC EXPERIMENT', progress:0, status:'open' },
  { id:'c6', num:'X-0715', title:'The Erlenmeyer Flask',desc:'Alien DNA in human subjects. The Syndicate is involved.', clues:6, reward:40, classification:'CONSPIRACY', progress:0, status:'open' },
  { id:'c7', num:'X-0924', title:'Ascension',          desc:'Scully has been taken. Mulder races to find her before it\'s too late.', clues:5, reward:35, classification:'ABDUCTION', progress:0, status:'locked' },
  { id:'c8', num:'X-1201', title:'The Sixth Extinction',desc:'A spacecraft buried in Africa. Ancient writing linked to human DNA.', clues:8, reward:60, classification:'MYTHOLOGY ARC', progress:0, status:'locked' },
  { id:'c9', num:'X-0042', title:'Home',               desc:'The Peacock family. A disturbing case in rural Pennsylvania.', clues:3, reward:20, classification:'DISTURBING', progress:0, status:'open' },
  { id:'c10',num:'X-1033', title:'Memento Mori',       desc:'Scully\'s cancer. MUFON victims. The Syndicate\'s role exposed.', clues:7, reward:50, classification:'MYTHOLOGY ARC', progress:0, status:'locked' },
  { id:'c11',num:'X-0811', title:'Tooms',              desc:'Eugene Tooms is back. Can Mulder stop him before he kills again?', clues:4, reward:25, classification:'MUTANT', progress:0, status:'open' },
];

const CLUES = [
  'Alien implant recovered', 'Witness silenced by Men in Black', 'Government cover-up confirmed',
  'DNA sample analyzed — non-human', 'Security footage corrupted', 'Syndicate operative identified',
  'Body shows signs of alien contact', 'Classified document retrieved', 'Black oil residue found',
  'Informant message decoded', 'Warehouse 74 has been cleared out', 'Lone Gunmen analysis complete',
];

let actionLog = [];
let tickTimer = 0;

// ── RENDER ────────────────────────────────────────────
function renderAgents() {
  const list = document.getElementById('agent-list');
  list.innerHTML = '';
  AGENTS.forEach(a => {
    const pct = Math.min(100, a.xp / a.xpNext * 100);
    const div = document.createElement('div');
    div.className = 'agent-card';
    div.innerHTML = `
      <div class="agent-avatar">${a.avatar}</div>
      <div class="agent-info">
        <div class="agent-name">${a.name}</div>
        <div class="agent-role">${a.role} · Lvl ${a.level}</div>
        <div class="agent-stats">
          <div class="agent-stat">${a.stat1}</div>
          <div class="agent-stat">${a.stat2}</div>
        </div>
        <div class="xp-bar-wrap"><div class="xp-bar" style="width:${pct}%"></div></div>
      </div>
      <button class="agent-skill-btn" onclick="useSkill('${a.id}')">Use ${a.skill}</button>`;
    list.appendChild(div);
  });
}

function renderCases() {
  const list = document.getElementById('case-list');
  list.innerHTML = '';
  CASES.forEach(c => {
    const locked = c.status === 'locked' && G.closedCases < 2;
    const div = document.createElement('div');
    div.className = 'case-card' + (G.activeCase === c.id ? ' active-case' : '') + (locked ? '' : '');
    div.style.opacity = locked ? '0.4' : '1';
    div.style.cursor = locked ? 'not-allowed' : 'pointer';
    div.innerHTML = `
      <div class="case-num">FILE ${c.num} — ${c.classification}</div>
      <div class="case-title">${locked ? '▓▓▓ CLASSIFIED ▓▓▓' : c.title}</div>
      <div class="case-desc">${locked ? 'Close more cases to unlock this file.' : c.desc}</div>
      <div class="case-status ${c.status}">[${c.status.toUpperCase()}]</div>
      <div class="case-progress"><div class="case-prog-fill" style="width:${c.progress/c.clues*100}%"></div></div>
      <div style="font-size:10px;color:var(--paper3);margin-top:4px">${c.progress}/${c.clues} clues · Reward: ${c.reward} XP</div>
      ${!locked && c.status !== 'closed' ? `<button class="case-btn" onclick="activateCase('${c.id}')">Investigate</button>` : ''}`;
    list.appendChild(div);
  });
}

function renderCorkboard() {
  const items = document.getElementById('cork-items');
  const pins = [
    { color:'red',    title:'Syndicate',   text:'Shadow group controlling global events. 12 members. Goal: alien colonization.' },
    { color:'yellow', title:'Black Oil',   text:'Sentient alien virus. Transmitted by eye contact. Controls the host.' },
    { color:'blue',   title:'Samantha',    text:'Mulder\'s sister. Abducted 1973. Connection to Cigarette Man.' },
    { color:'red',    title:'CSM',         text:'Smoking Man. Real name: C.G.B. Spender. Controls Syndicate.' },
    { color:'yellow', title:'Roswell 1947',text:'Crashed alien ship. Government recovered alien. Covered up.' },
    { color:'blue',   title:'MUFON',       text:'Mutual UFO Network. Many members are abductees with implants.' },
    ...G.conspiracyPins
  ];
  items.innerHTML = pins.map(p => `<div class="cork-item ${p.color}"><strong>${p.title}</strong>${p.text}</div>`).join('');
}

function renderLog() {
  const log = document.getElementById('action-log');
  log.innerHTML = actionLog.slice(-20).reverse().map(e => `<div class="log-entry ${e.type}">[Day ${e.day}] ${e.msg}</div>`).join('');
}

function updateHUD() {
  document.getElementById('hdr-ap').textContent = G.ap;
  document.getElementById('hdr-day').textContent = G.day;
  document.getElementById('hdr-case').textContent = G.activeCase ? `CASE ${CASES.find(c=>c.id===G.activeCase)?.num}` : 'FBI PARANORMAL DIVISION';
}

// ── ACTIONS ───────────────────────────────────────────
function useSkill(agentId) {
  if (G.ap <= 0) { notify('No Action Points! Rest to recover.'); return; }
  const agent = AGENTS.find(a => a.id === agentId);
  if (!agent) return;
  G.ap--;
  agent.xp += 15;
  if (agent.xp >= agent.xpNext) { agent.xp -= agent.xpNext; agent.level++; agent.xpNext = Math.floor(agent.xpNext * 1.5); notify(`${agent.name} leveled up!`); }

  // Use skill on active case
  if (G.activeCase) {
    const c = CASES.find(c => c.id === G.activeCase);
    if (c && c.status !== 'closed') {
      c.progress = Math.min(c.clues, c.progress + 1);
      const clue = CLUES[Math.floor(Math.random() * CLUES.length)];
      addLog(`${agent.name} used ${agent.skill}: ${clue}`, 'important');
      if (c.progress >= c.clues) {
        c.status = 'closed';
        G.closedCases++;
        G.clues += c.reward;
        G.conspiracyPins.push({ color:'yellow', title:c.title, text:`Case ${c.num} solved. ${c.classification}.` });
        addLog(`CASE CLOSED: ${c.title}! +${c.reward} XP`, 'success');
        notify(`✓ Case closed: ${c.title}!`);
        // Unlock next case
        CASES.forEach(nc => { if (nc.status === 'locked' && G.closedCases >= 2) nc.status = 'open'; });
      }
    }
  } else {
    addLog(`${agent.name} used ${agent.skill}. Assign a case to make progress.`);
    notify('Assign a case first!');
  }

  renderAgents(); renderCases(); updateHUD();
}

function activateCase(id) {
  G.activeCase = G.activeCase === id ? null : id;
  renderCases(); updateHUD();
  if (G.activeCase) { const c = CASES.find(c=>c.id===id); notify(`Now investigating: ${c.title}`); }
}

function addLog(msg, type = '') {
  actionLog.push({ day: G.day, msg, type });
  if (document.getElementById('pan-log').classList.contains('active')) renderLog();
}

// ── GAME LOOP ─────────────────────────────────────────
function gameTick() {
  tickTimer++;
  if (tickTimer % 300 === 0) { // Every 30 seconds
    G.day++;
    G.ap = Math.min(G.maxAP, G.ap + 1);
    addLog('A new day. The truth remains elusive.');
    saveGame();
    updateHUD();
  }
  setTimeout(gameTick, 100);
}

// ── SAVE / LOAD ───────────────────────────────────────
function saveGame() {
  localStorage.setItem('xfiles_save', JSON.stringify({ G, agents: AGENTS.map(a=>({xp:a.xp,xpNext:a.xpNext,level:a.level})), cases: CASES.map(c=>({progress:c.progress,status:c.status})), log: actionLog.slice(-50) }));
}

function loadGame() {
  try {
    const d = JSON.parse(localStorage.getItem('xfiles_save'));
    if (!d) { alert('No save found.'); return; }
    Object.assign(G, d.G);
    d.agents.forEach((a, i) => { if (AGENTS[i]) Object.assign(AGENTS[i], a); });
    d.cases.forEach((c, i) => { if (CASES[i]) { CASES[i].progress = c.progress; CASES[i].status = c.status; } });
    actionLog = d.log || [];
    startGame();
  } catch(e) { alert('No save found.'); }
}

function startGame() {
  showScreen('scr-game');
  addLog('The X-Files division is open. Seek the truth.', 'important');
  renderAgents(); renderCases(); renderCorkboard(); renderLog(); updateHUD();
  gameTick();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(el.dataset.panel).classList.add('active');
  if (el.dataset.panel === 'pan-agents') renderAgents();
  if (el.dataset.panel === 'pan-cases') renderCases();
  if (el.dataset.panel === 'pan-board') renderCorkboard();
  if (el.dataset.panel === 'pan-log') renderLog();
}

let notifyTO;
function notify(msg) {
  const el = document.getElementById('notify');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(notifyTO);
  notifyTO = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
